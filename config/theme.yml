name: KickVault-Custom-Prestashop-Theme
display_name: KickVault Custom Theme
version: 1.0.0
author:
  name: "h1den"
parent: hummingbird

meta:
  compatibility:
    from: 8.0.0
    to: ~
  available_layouts:
    layout-full-width:
      name: Full Width
      description: Page without columns, ideal for homepage or checkout.
    layout-both-columns:
      name: Three Columns
      description: Page with both left and right columns.
    layout-left-column:
      name: Two Columns, small left column
      description: Page with a left column only.
    layout-right-column:
      name: Two Columns, small right column
      description: Page with a right column only.

assets:
  js:
    all:
      - id: theme-js
        path: assets/js/theme.js
        priority: 100
  css:
    all:
      - id: theme-css
        path: assets/css/theme.css
        priority: 100